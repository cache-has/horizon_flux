name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgtk-3-dev libglib2.0-dev \
            libayatana-appindicator3-dev libxdo-dev

      # rust-embed requires the frontend/dist/ folder to exist at compile time.
      # The frontend job validates the real build; here we just need the dir.
      - name: Create frontend dist stub
        run: mkdir -p frontend/dist

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      # This is an npm workspace: the lockfile lives at the repo root and
      # `npm ci` must run there to install all workspaces (including frontend).
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Type check
        run: npx tsc -b
        working-directory: frontend
