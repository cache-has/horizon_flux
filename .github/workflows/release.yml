name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Single macOS universal (x86_64 + arm64) build on Apple Silicon,
          # avoiding the retiring Intel macos-13 runner.
          - target: universal-apple-darwin
            runner: macos-latest
            os: macos
            archive: tar.gz
            cargo_flags: "--features tray"
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            os: linux
            archive: tar.gz
            cargo_flags: "--features tray"
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            os: linux-musl
            archive: tar.gz
            cargo_flags: "--no-default-features"
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            os: windows
            archive: zip
            cargo_flags: "--features tray"

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          targets: ${{ matrix.os == 'macos' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      # Linux glibc: install system deps for tray icon / GTK
      - name: Install Linux system dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgtk-3-dev libglib2.0-dev \
            libayatana-appindicator3-dev libxdo-dev

      # Linux musl: install musl toolchain
      - name: Install musl toolchain
        if: matrix.os == 'linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      # npm workspace: install from the root lockfile, then build the frontend.
      - name: Build frontend
        run: |
          npm ci
          npm run build --workspace=frontend

      - name: Run tests
        # Skip on packaging-only targets: musl (`--workspace` builds armillary-tray's
        # GTK/glib, which can't cross-compile to musl) and macOS (the universal
        # target isn't a real rustc target). CI runs the full suite on every
        # platform on each push, so this release-time re-test is redundant there.
        if: matrix.os != 'linux-musl' && matrix.os != 'macos'
        run: cargo test --workspace --target ${{ matrix.target }} ${{ matrix.cargo_flags }}

      - name: Build release binary
        if: matrix.os != 'macos'
        run: >
          cargo build --release --bin armillary
          --target ${{ matrix.target }}
          ${{ matrix.cargo_flags }}

      # macOS: build both arch slices and lipo them into a universal binary at
      # target/universal-apple-darwin/release/ so the packaging step is unchanged.
      - name: Build release binary (macOS universal)
        if: matrix.os == 'macos'
        run: |
          cargo build --release --bin armillary --target aarch64-apple-darwin ${{ matrix.cargo_flags }}
          cargo build --release --bin armillary --target x86_64-apple-darwin ${{ matrix.cargo_flags }}
          mkdir -p target/universal-apple-darwin/release
          lipo -create -output target/universal-apple-darwin/release/armillary \
            target/aarch64-apple-darwin/release/armillary \
            target/x86_64-apple-darwin/release/armillary
          lipo -info target/universal-apple-darwin/release/armillary

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          BINARY="target/${{ matrix.target }}/release/armillary"
          ARCHIVE="armillary-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          tar -czf "$ARCHIVE" -C "$(dirname "$BINARY")" "$(basename "$BINARY")"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
          echo "BINARY_SIZE=$(wc -c < "$BINARY" | tr -d ' ')" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $binary = "target/${{ matrix.target }}/release/armillary.exe"
          $archive = "armillary-${{ github.ref_name }}-${{ matrix.target }}.zip"
          Compress-Archive -Path $binary -DestinationPath $archive
          "ARCHIVE=$archive" | Out-File -Append $env:GITHUB_ENV
          $size = (Get-Item $binary).Length
          "BINARY_SIZE=$size" | Out-File -Append $env:GITHUB_ENV

      - name: Report binary size
        run: echo "::notice title=Binary size (${{ matrix.target }})::${{ env.BINARY_SIZE }} bytes"

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Only the binary archives — `pattern` excludes the `.dockerbuild` build
      # record that docker/build-push-action uploads, which download-artifact
      # otherwise chokes on (and which the release doesn't need).
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: binary-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum armillary-* > ../checksums-sha256.txt
          mv ../checksums-sha256.txt .
          cat checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          files: |
            artifacts/armillary-*
            artifacts/checksums-sha256.txt

  docker:
    name: Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            cachehorizon/armillary:latest
            cachehorizon/armillary:${{ steps.version.outputs.version }}
            ghcr.io/cache-has/armillary:latest
            ghcr.io/cache-has/armillary:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
