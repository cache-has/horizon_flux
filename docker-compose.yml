services:
  armillary:
    image: cachehorizon/armillary:latest
    build: .
    ports:
      - "8080:8080"
    volumes:
      - armillary-data:/data
    environment:
      # Uncomment to auto-unlock the secret store on startup:
      # ARMILLARY_SECRET_PASSWORD: "changeme"
      #
      # Uncomment to use PostgreSQL for pipeline metadata:
      # ARMILLARY_METADATA_URL: "postgresql://user:pass@host:5432/armillary"
      RUST_LOG: "info"

volumes:
  armillary-data:
